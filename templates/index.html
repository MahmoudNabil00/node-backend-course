<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css" type="text/css">
    <title>Node Application</title>
    <script src="scripts/index.js"></script>
    <script src="scripts/console.js"></script>
    <style>
        .header{
            background-color: var(--primary-color);
            color: var(--text-color);
            padding: 10px;
            text-align: center;
        }
        .content{
            font-size: 20px;
            color: #333;
            text-align: center;
        }
        .replace-content{
            background-color: #333;
            color: antiquewhite;
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            font-style: italic;
            font-variant: small-caps;
            font-stretch: condensed;
            font-kerning: normal;
            font-feature-settings: 'liga', 'clig';
            font-optical-sizing: auto;
            font-variation-settings: 'wght' 400, 'wdth' 100;
            font-synthesis: none;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header" >Node Application</h1>
        <p class="content">This is a node application</p>
        <p class="content">This is a node application</p>
        <p class="replace-content">{{%CONTENT%}}</p>
    </div>
</body>
</html>
